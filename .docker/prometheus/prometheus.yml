global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'api'
    static_configs:
      - targets: ['api:9464']

  - job_name: 'api-nodejs'
    metrics_path: '/metrics/nodejs'
    static_configs:
      - targets: ['api:9464']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:9487']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

