services:
  k6:
    image: grafana/k6:latest
    networks:
      - observabilidade_net
    volumes:
      - ./scripts:/scripts:ro
    environment:
      BASE_URL: http://api:8082
      API_KEY: ${API_KEY:-api-secret-key}
    # Uso: docker compose -f docker-compose.k6.yml run --rm k6 run /scripts/<teste>.js
    command: run /scripts/smoke.js

networks:
  observabilidade_net:
    external: true
    name: observability
