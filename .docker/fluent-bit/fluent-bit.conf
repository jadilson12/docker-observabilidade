[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     warn

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

[FILTER]
    Name    record_modifier
    Match   *
    Record  log_source docker-compose

[OUTPUT]
    Name               opensearch
    Match              *
    Host               opensearch
    Port               9200
    Index              docker-logs
    Suppress_Type_Name On
    tls                Off
    Retry_Limit        3
